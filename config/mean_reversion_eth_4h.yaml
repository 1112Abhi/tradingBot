strategy: mean_reversion
symbol: ETHUSDT
timeframe: 4h
mode: experiment

params:
  rsi_period: 14
  rsi_oversold: 35    # BUY when RSI drops below this
  rsi_exit: 55        # SELL when RSI recovers above this
  trend_period: 50    # EMA period for trend filter

risk:
  sl: 1.5             # stop loss %
  tp: 6.0             # take profit %
  position_size: 0.25 # fraction of capital (experiment — no real capital used)

# Backtest (3yr ETHUSDT 4h, 25% size):
#   return=+12.96%  sharpe=0.47  DD=8.29%  win%=31.8  trades=192
