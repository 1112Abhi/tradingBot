strategy: donchian_regime
symbol: BTCUSDT
timeframe: 4h
mode: experiment

params:
  period: 20              # Donchian channel lookback
  regime_period: 30       # R² regression window (optimal from research)
  regime_threshold: 0.35  # R² above this = trending (optimal from research)

risk:
  sl: 1.5                 # stop loss %
  tp: 6.0                 # take profit %
  position_size: 0.25     # fraction of capital (experiment — no real capital used)

